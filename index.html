<!DOCTYPE html>
<html lang="es">
<input type="file" id="excel-input" accept=".xlsx, .xls" />

<head>
    <script src="https://sheetjs.com"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Flashcards</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f0f2f5; }

        button { padding: 10px 20px; font-size: 1rem; cursor: pointer; border-radius: 5px; border: none; background: #007bff; color: white; }
    </style>

    <div id="card">Toca para empezar</div>

<!DOCTYPE html>
<html lang="es">
<!--<input type="file" id="excel-input" accept=".xlsx, .xls" />-->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Flashcards</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f0f2f5; }
        #card { width: 300px; height: 200px; background: white; display: flex; align-items: center; justify-content: center; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); font-size: 1.5rem; text-align: center; padding: 20px; cursor: pointer; margin-bottom: 20px; }
        button { padding: 10px 20px; font-size: 1rem; cursor: pointer; border-radius: 5px; border: none; background: #007bff; color: white; }
    </style>
</head>
<body>
    
    <div id="setup-view">
        <h1>Mis Mazos</h1>
        
        <!-- Lista de mazos -->
        <div id="decks-container" style="margin-bottom: 20px;"></div>
    
        <hr>
        <h3>Añadir nuevo mazo</h3>
        <input type="text" id="deck-name" placeholder="Nombre del mazo (ej. Historia)">
        <input type="file" id="excel-input" accept=".xlsx, .xls" />
    </div>

    <div id="study-view" style="display:none;">
        <button onclick="goToHome()">⬅ Volver</button>
        <p>Mazo: <b id="current-deck-title"></b></p>
        <p>Pendientes: <span id="cards-left">0</span></p>
        <!-- ... resto del contenedor de cartas anterior ... -->
    </div>


    
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
